
<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PennyPatrol – Expense Tracker</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,500,600,700&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens ─────────────────────────────── */
:root, [data-theme="light"] {
  --color-bg:             #f7f6f2;
  --color-surface:        #f9f8f5;
  --color-surface-2:      #ffffff;
  --color-surface-offset: #f0ede8;
  --color-divider:        #e2dfd9;
  --color-border:         #d8d4cd;
  --color-text:           #28251d;
  --color-text-muted:     #7a7974;
  --color-text-faint:     #b0aea9;
  --color-text-inverse:   #f9f8f4;
  --color-primary:        #01696f;
  --color-primary-hover:  #0c4e54;
  --color-primary-active: #0f3638;
  --color-primary-highlight: #cedcd8;
  --color-success:        #437a22;
  --color-error:          #a12c7b;
  --color-warning:        #964219;
  --color-orange:         #da7101;
  --color-gold:           #d19900;
  --color-blue:           #006494;
  --color-purple:         #7a39bb;
  --color-notification:   #a13544;
  --color-surface-input:  #ffffff;
  --radius-sm: 0.375rem;
  --radius-md: 0.5rem;
  --radius-lg: 0.75rem;
  --radius-xl: 1rem;
  --radius-2xl: 1.25rem;
  --radius-full: 9999px;
  --shadow-sm: 0 1px 3px oklch(0.2 0.01 80 / 0.07);
  --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.09);
  --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.13);
  --transition: 160ms cubic-bezier(0.16, 1, 0.3, 1);
  --text-xs: clamp(0.75rem, 0.7rem + 0.25vw, 0.875rem);
  --text-sm: clamp(0.875rem, 0.8rem + 0.35vw, 1rem);
  --text-base: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
  --text-lg: clamp(1.125rem, 1rem + 0.75vw, 1.5rem);
  --text-xl: clamp(1.5rem, 1.2rem + 1.25vw, 2.25rem);
  --font-body: 'Satoshi', 'Inter', sans-serif;
  --nav-height: 70px;
}
[data-theme="dark"] {
  --color-bg:             #171614;
  --color-surface:        #1c1b19;
  --color-surface-2:      #232220;
  --color-surface-offset: #1e1d1b;
  --color-divider:        #2a2927;
  --color-border:         #353330;
  --color-text:           #cdccca;
  --color-text-muted:     #797876;
  --color-text-faint:     #5a5957;
  --color-text-inverse:   #2b2a28;
  --color-primary:        #4f98a3;
  --color-primary-hover:  #227f8b;
  --color-primary-active: #1a626b;
  --color-primary-highlight: #1e3438;
  --color-success:        #6daa45;
  --color-error:          #d163a7;
  --color-warning:        #bb653b;
  --color-orange:         #fdab43;
  --color-gold:           #e8af34;
  --color-blue:           #5591c7;
  --color-purple:         #a86fdf;
  --color-notification:   #dd6974;
  --color-surface-input:  #22211f;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.2);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.3);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.4);
}

/* ─── Base Reset ────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-font-smoothing: antialiased; -webkit-text-size-adjust: none; text-size-adjust: none; }
body {
  font-family: var(--font-body);
  font-size: var(--text-sm);
  color: var(--color-text);
  background: var(--color-bg);
  min-height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  overflow: hidden;
  position: relative;
}
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
input { font: inherit; color: inherit; }
a, button, [role="button"] {
  transition: color var(--transition), background var(--transition), box-shadow var(--transition), transform var(--transition);
}
button:active { transform: scale(0.97); }

/* ─── App Shell ─────────────────────────────────── */
.app-shell {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* ─── Status Bar ────────────────────────────────── */
.status-bar {
  height: 44px;
  background: var(--color-surface);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--color-divider);
}
.status-bar-time {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
}
.status-bar-icons { display: flex; gap: 6px; align-items: center; }
.status-bar-icons svg { width: 16px; height: 16px; }

/* ─── Page Container ────────────────────────────── */
.pages {
  flex: 1;
  overflow: hidden;
  position: relative;
}
.page {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease;
}
.page.active {
  opacity: 1;
  pointer-events: all;
}

/* ─── Bottom Navigation ─────────────────────────── */
.bottom-nav {
  height: var(--nav-height);
  background: var(--color-surface);
  border-top: 1px solid var(--color-divider);
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding-bottom: env(safe-area-inset-bottom, 0);
  flex-shrink: 0;
  box-shadow: 0 -2px 16px oklch(0.2 0.01 80 / 0.06);
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 20px;
  border-radius: var(--radius-lg);
  cursor: pointer;
  transition: color var(--transition);
  min-width: 72px;
}
.nav-item svg { width: 24px; height: 24px; transition: transform var(--transition); }
.nav-item span { font-size: 11px; font-weight: 500; letter-spacing: 0.01em; }
.nav-item { color: var(--color-text-faint); }
.nav-item.active { color: var(--color-primary); }
.nav-item.active svg { transform: translateY(-1px); }
.nav-center {
  width: 56px;
  height: 56px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  color: var(--color-text-inverse);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  box-shadow: 0 4px 18px oklch(from var(--color-primary) l c h / 0.45);
  margin-bottom: 6px;
}
.nav-center svg { width: 22px; height: 22px; }
.nav-center span { font-size: 9px; font-weight: 700; letter-spacing: 0.04em; }
.nav-center.active { background: var(--color-primary-active); }

/* ─── Page Header ────────────────────────────────── */
.page-header {
  background: var(--color-surface);
  padding: 16px 20px 12px;
  border-bottom: 1px solid var(--color-divider);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.page-header h1 {
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
}
.theme-toggle {
  width: 36px; height: 36px;
  border-radius: var(--radius-full);
  background: var(--color-surface-offset);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
}
.theme-toggle svg { width: 18px; height: 18px; }

/* ─── SPEND NOW PAGE ─────────────────────────────── */
#page-spend {
  background: var(--color-bg);
}

.spend-top {
  flex: 0 0 45%;
  background: var(--color-surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--color-divider);
  position: relative;
}

.date-field {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-full);
  padding: 6px 14px;
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--color-text-muted);
  cursor: pointer;
  margin-bottom: 18px;
  transition: background var(--transition), border-color var(--transition);
}
.date-field:hover { background: var(--color-divider); }
.date-field svg { width: 14px; height: 14px; }

.amount-display-wrap {
  display: flex;
  align-items: baseline;
  gap: 4px;
  cursor: text;
  padding: 8px 12px;
  border-radius: var(--radius-lg);
  transition: background var(--transition);
}
.amount-display-wrap:focus-within {
  background: oklch(from var(--color-primary) l c h / 0.06);
}
.amount-currency {
  font-size: clamp(1.8rem, 7vw, 2.4rem);
  font-weight: 700;
  color: var(--color-text-faint);
  letter-spacing: -0.02em;
  line-height: 1;
  flex-shrink: 0;
}
#amount-input {
  font-size: clamp(3rem, 12vw, 4rem);
  font-weight: 700;
  letter-spacing: -0.04em;
  color: var(--color-primary);
  background: none;
  border: none;
  outline: none;
  width: 100%;
  max-width: 220px;
  text-align: center;
  line-height: 1;
  -moz-appearance: textfield;
}
#amount-input::-webkit-outer-spin-button,
#amount-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
#amount-input::placeholder { color: var(--color-text-faint); }

/* Note field */
.note-field {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 8px 14px;
  margin-top: 14px;
  width: 100%;
  max-width: 320px;
}
.note-field svg { width: 14px; height: 14px; color: var(--color-text-faint); flex-shrink: 0; }
.note-field input {
  background: none;
  border: none;
  outline: none;
  font-size: var(--text-xs);
  color: var(--color-text);
  width: 100%;
  placeholder-shown: font-style italic;
}
.note-field input::placeholder { color: var(--color-text-faint); }

/* Categories */
.spend-bottom {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 14px 16px 12px;
}
.section-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
  padding-left: 2px;
}
.categories-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.cat-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  background: var(--color-surface-2);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-xl);
  padding: 14px 8px 10px;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
}
.cat-btn:hover { border-color: var(--color-primary); }
.cat-btn.selected {
  border-color: var(--color-primary);
  background: var(--color-primary-highlight);
  box-shadow: 0 0 0 1px var(--color-primary);
}
.cat-btn .cat-icon {
  width: 40px;
  height: 40px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
}
.cat-btn .cat-name {
  font-size: 11px;
  font-weight: 600;
  text-align: center;
  color: var(--color-text);
  letter-spacing: 0.01em;
}
.cat-btn.selected .cat-name { color: var(--color-primary); }

/* Confirm Button */
.confirm-bar {
  padding: 12px 16px;
  background: var(--color-surface);
  border-top: 1px solid var(--color-divider);
  flex-shrink: 0;
}
.confirm-btn {
  width: 100%;
  padding: 16px;
  background: var(--color-primary);
  color: var(--color-text-inverse);
  border-radius: var(--radius-xl);
  font-size: var(--text-base);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  box-shadow: 0 4px 18px oklch(from var(--color-primary) l c h / 0.35);
  transition: all var(--transition);
}
.confirm-btn:hover { background: var(--color-primary-hover); box-shadow: 0 6px 22px oklch(from var(--color-primary) l c h / 0.45); }
.confirm-btn:active { background: var(--color-primary-active); transform: scale(0.99); }
.confirm-btn:disabled {
  background: var(--color-border);
  color: var(--color-text-faint);
  box-shadow: none;
  cursor: default;
}

/* ─── ACTIVITY PAGE ──────────────────────────────── */
#page-activity { background: var(--color-bg); }

.filter-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex-shrink: 0;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-divider);
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  scroll-snap-align: start;
  flex-shrink: 0;
  padding: 7px 16px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 600;
  border: 1.5px solid var(--color-border);
  background: var(--color-surface-2);
  color: var(--color-text-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
}
.filter-chip.active {
  background: var(--color-primary);
  border-color: var(--color-primary);
  color: var(--color-text-inverse);
}

.activity-list {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 0 16px 16px;
}
.activity-date-group {
  margin-top: 16px;
}
.activity-date-label {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text-faint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 4px 0 8px;
}
.activity-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--color-surface-2);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 8px;
  box-shadow: var(--shadow-sm);
  border: 1px solid oklch(from var(--color-text) l c h / 0.06);
  cursor: pointer;
  transition: box-shadow var(--transition), transform var(--transition);
}
.activity-item:hover { box-shadow: var(--shadow-md); }
.activity-item:active { transform: scale(0.99); }
.activity-icon {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.activity-info { flex: 1; min-width: 0; }
.activity-cat {
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--color-text);
}
.activity-note {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}
.activity-time {
  font-size: 11px;
  color: var(--color-text-faint);
  margin-top: 2px;
}
.activity-amount {
  font-size: var(--text-base);
  font-weight: 700;
  color: var(--color-text);
  font-variant-numeric: tabular-nums;
  letter-spacing: -0.01em;
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 64px 24px;
  color: var(--color-text-muted);
}
.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  opacity: 0.5;
}
.empty-state h3 {
  font-size: var(--text-base);
  font-weight: 600;
  color: var(--color-text);
  margin-bottom: 6px;
}
.empty-state p {
  font-size: var(--text-sm);
  max-width: 28ch;
  line-height: 1.5;
}

.activity-summary-bar {
  background: var(--color-primary-highlight);
  padding: 10px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.activity-summary-bar span { font-size: var(--text-xs); color: var(--color-primary); font-weight: 600; }
.activity-summary-bar strong { font-size: var(--text-sm); color: var(--color-primary); font-weight: 700; font-variant-numeric: tabular-nums; }

/* ─── STATISTICS PAGE ────────────────────────────── */
#page-stats { background: var(--color-bg); }

.stats-content {
  flex: 1;
  overflow-y: auto;
  overscroll-behavior: contain;
  padding: 16px;
}
.stats-period-tabs {
  display: flex;
  background: var(--color-surface-offset);
  border-radius: var(--radius-lg);
  padding: 4px;
  gap: 4px;
  margin-bottom: 20px;
}
.stats-tab {
  flex: 1;
  padding: 8px 4px;
  border-radius: calc(var(--radius-lg) - 2px);
  font-size: var(--text-xs);
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  color: var(--color-text-muted);
  transition: all var(--transition);
}
.stats-tab.active {
  background: var(--color-surface-2);
  color: var(--color-primary);
  box-shadow: var(--shadow-sm);
}

.stats-total-card {
  background: var(--color-primary);
  border-radius: var(--radius-2xl);
  padding: 22px 20px;
  color: var(--color-text-inverse);
  margin-bottom: 20px;
  box-shadow: 0 8px 28px oklch(from var(--color-primary) l c h / 0.35);
}
.stats-total-label { font-size: var(--text-xs); font-weight: 600; opacity: 0.7; letter-spacing: 0.06em; text-transform: uppercase; }
.stats-total-amount {
  font-size: clamp(2rem, 8vw, 3rem);
  font-weight: 700;
  letter-spacing: -0.03em;
  margin: 4px 0;
  font-variant-numeric: tabular-nums;
}
.stats-total-sub { font-size: var(--text-xs); opacity: 0.7; }

.stats-section-title {
  font-size: var(--text-sm);
  font-weight: 700;
  color: var(--color-text);
  margin-bottom: 12px;
  letter-spacing: -0.01em;
}

.stats-bar-card {
  background: var(--color-surface-2);
  border-radius: var(--radius-xl);
  padding: 18px;
  margin-bottom: 20px;
  box-shadow: var(--shadow-sm);
  border: 1px solid oklch(from var(--color-text) l c h / 0.05);
}

.stats-bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.stats-bar-row:last-child { margin-bottom: 0; }
.stats-bar-icon { font-size: 16px; width: 26px; text-align: center; flex-shrink: 0; }
.stats-bar-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text);
  width: 70px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.stats-bar-track {
  flex: 1;
  height: 8px;
  background: var(--color-surface-offset);
  border-radius: var(--radius-full);
  overflow: hidden;
}
.stats-bar-fill {
  height: 100%;
  border-radius: var(--radius-full);
  transition: width 600ms cubic-bezier(0.16, 1, 0.3, 1);
}
.stats-bar-amount {
  font-size: var(--text-xs);
  font-weight: 700;
  color: var(--color-text);
  min-width: 52px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.stats-timeline-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}
.stats-kpi {
  background: var(--color-surface-2);
  border-radius: var(--radius-xl);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid oklch(from var(--color-text) l c h / 0.05);
}
.stats-kpi-label { font-size: 11px; font-weight: 600; color: var(--color-text-faint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.stats-kpi-value { font-size: var(--text-lg); font-weight: 700; color: var(--color-text); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.stats-kpi-sub { font-size: 11px; color: var(--color-text-muted); margin-top: 2px; }

/* ─── Toast ──────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: calc(var(--nav-height) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--color-text);
  color: var(--color-surface);
  padding: 12px 20px;
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 600;
  opacity: 0;
  pointer-events: none;
  transition: all 300ms cubic-bezier(0.16, 1, 0.3, 1);
  white-space: nowrap;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ─── Date Picker Modal ──────────────────────────── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: oklch(0.1 0 0 / 0.5);
  z-index: 50;
  display: flex;
  align-items: flex-end;
  opacity: 0;
  pointer-events: none;
  transition: opacity 200ms ease;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal-sheet {
  width: 100%;
  background: var(--color-surface);
  border-radius: var(--radius-2xl) var(--radius-2xl) 0 0;
  padding: 12px 20px 32px;
  transform: translateY(100%);
  transition: transform 280ms cubic-bezier(0.16, 1, 0.3, 1);
}
.modal-overlay.open .modal-sheet { transform: translateY(0); }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--color-border);
  border-radius: var(--radius-full);
  margin: 0 auto 16px;
}
.modal-title {
  font-size: var(--text-base);
  font-weight: 700;
  margin-bottom: 16px;
  text-align: center;
}
.date-input-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-bottom: 16px;
}
.date-input-row label { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); }
.date-native-input {
  width: 100%;
  padding: 12px 14px;
  background: var(--color-surface-offset);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  font-size: var(--text-sm);
  font-family: var(--font-body);
  color: var(--color-text);
  outline: none;
  transition: border-color var(--transition);
}
.date-native-input:focus { border-color: var(--color-primary); }
.modal-action-btn {
  width: 100%;
  padding: 14px;
  background: var(--color-primary);
  color: var(--color-text-inverse);
  border-radius: var(--radius-xl);
  font-weight: 700;
  font-size: var(--text-sm);
  margin-top: 8px;
}


/* ─── Add Category Button ────────────────────────── */
.section-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
  padding-left: 2px;
}
.add-cat-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  background: var(--color-surface-2);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 700;
  color: var(--color-primary);
  letter-spacing: 0.02em;
  box-shadow: var(--shadow-sm);
  transition: all var(--transition);
}
.add-cat-btn:hover { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.add-cat-btn svg { width: 13px; height: 13px; }

/* ─── New Category Modal ─────────────────────────── */
.emoji-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  margin-bottom: 16px;
  max-height: 160px;
  overflow-y: auto;
}
.emoji-opt {
  width: 100%;
  aspect-ratio: 1;
  border-radius: var(--radius-lg);
  border: 2px solid transparent;
  background: var(--color-surface-offset);
  font-size: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all var(--transition);
}
.emoji-opt:hover { background: var(--color-primary-highlight); }
.emoji-opt.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); }

.color-swatches {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.color-swatch {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-full);
  cursor: pointer;
  border: 3px solid transparent;
  transition: transform var(--transition), border-color var(--transition);
}
.color-swatch:hover { transform: scale(1.12); }
.color-swatch.selected { border-color: var(--color-text); transform: scale(1.12); }

.modal-field-label {
  font-size: var(--text-xs);
  font-weight: 600;
  color: var(--color-text-muted);
  margin-bottom: 6px;
  display: block;
}
.modal-text-input {
  width: 100%;
  padding: 11px 14px;
  background: var(--color-surface-offset);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  font-size: var(--text-sm);
  font-family: var(--font-body);
  color: var(--color-text);
  outline: none;
  margin-bottom: 16px;
  transition: border-color var(--transition);
}
.modal-text-input:focus { border-color: var(--color-primary); }
.modal-text-input::placeholder { color: var(--color-text-faint); }

.modal-preview {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  background: var(--color-surface-offset);
  border-radius: var(--radius-lg);
  margin-bottom: 16px;
}
.modal-preview-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}
.modal-preview-name {
  font-weight: 700;
  font-size: var(--text-sm);
  color: var(--color-text);
}
.modal-preview-sub {
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-top: 2px;
}

.modal-btn-row {
  display: flex;
  gap: 10px;
}
.modal-btn-secondary {
  flex: 1;
  padding: 13px;
  background: var(--color-surface-offset);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-xl);
  font-weight: 600;
  font-size: var(--text-sm);
  color: var(--color-text-muted);
}
.modal-btn-primary {
  flex: 2;
  padding: 13px;

  color: var(--color-text-inverse);

}
.modal-btn-primary:disabled {
  background: var(--color-border);

}


/* ─── Edit/Delete Action Sheet ───────────────────── */
.action-sheet-item {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 4px;
  border-bottom: 1px solid var(--color-divider);
  cursor: pointer;
  border-radius: var(--radius-md);
  transition: background var(--transition);
}
.action-sheet-item:last-child { border-bottom: none; }
.action-sheet-item:hover { background: var(--color-surface-offset); }
.action-sheet-icon {
  width: 40px; height: 40px;
  border-radius: var(--radius-lg);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 18px;
}
.action-sheet-icon.edit-icon { background: var(--color-primary-highlight); color: var(--color-primary); }
.action-sheet-icon.delete-icon { background: #fee2e2; color: #dc2626; }
[data-theme="dark"] .action-sheet-icon.delete-icon { background: #3b1515; color: #f87171; }
.action-sheet-label { font-weight: 600; font-size: var(--text-sm); }
.action-sheet-label.delete { color: #dc2626; }
[data-theme="dark"] .action-sheet-label.delete { color: #f87171; }
.action-sheet-sub { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }

/* Activity item tap indicator */
.activity-item { position: relative; }
.activity-item-menu {
  width: 32px; height: 32px;
  border-radius: var(--radius-full);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-faint);
  flex-shrink: 0;
  transition: background var(--transition), color var(--transition);
}
.activity-item:hover .activity-item-menu { background: var(--color-surface-offset); color: var(--color-text-muted); }
.activity-item-menu svg { width: 16px; height: 16px; }

/* Edit modal fields */
.edit-form { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
.edit-field-group { display: flex; flex-direction: column; gap: 6px; }
.edit-field-group label { font-size: var(--text-xs); font-weight: 600; color: var(--color-text-muted); }
.edit-amount-wrap {
  display: flex; align-items: center; gap: 6px;
  background: var(--color-surface-offset);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 10px 14px;
  transition: border-color var(--transition);
}
.edit-amount-wrap:focus-within { border-color: var(--color-primary); }
.edit-amount-wrap span { font-size: var(--text-base); font-weight: 700; color: var(--color-text-faint); }
.edit-amount-input {
  background: none; border: none; outline: none;
  font-size: var(--text-base); font-weight: 700; color: var(--color-primary);
  width: 100%;
  -moz-appearance: textfield;
}
.edit-amount-input::-webkit-outer-spin-button,
.edit-amount-input::-webkit-inner-spin-button { -webkit-appearance: none; }
.edit-cat-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  max-height: 140px;
  overflow-y: auto;
}
.edit-cat-opt {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 4px;
  border-radius: var(--radius-lg);
  border: 1.5px solid var(--color-border);
  background: var(--color-surface-2);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 18px;
}
.edit-cat-opt span { font-size: 10px; font-weight: 600; color: var(--color-text-muted); text-align: center; }
.edit-cat-opt.selected { border-color: var(--color-primary); background: var(--color-primary-highlight); }
.edit-cat-opt.selected span { color: var(--color-primary); }

/* Confirm delete dialog */
.confirm-delete-overlay {
  position: fixed; inset: 0;
  background: oklch(0.1 0 0 / 0.6);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  opacity: 0; pointer-events: none;
  transition: opacity 180ms ease;
}
.confirm-delete-overlay.open { opacity: 1; pointer-events: all; }
.confirm-delete-box {
  background: var(--color-surface);
  border-radius: var(--radius-2xl);
  padding: 28px 24px 20px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  box-shadow: var(--shadow-lg);
  transform: scale(0.94);
  transition: transform 200ms cubic-bezier(0.16,1,0.3,1);
}
.confirm-delete-overlay.open .confirm-delete-box { transform: scale(1); }
.confirm-delete-emoji { font-size: 36px; margin-bottom: 12px; }
.confirm-delete-title { font-size: var(--text-base); font-weight: 700; margin-bottom: 6px; }
.confirm-delete-sub { font-size: var(--text-sm); color: var(--color-text-muted); margin-bottom: 20px; }
.confirm-delete-btns { display: flex; gap: 10px; }
.confirm-delete-cancel {
  flex: 1; padding: 12px;
  background: var(--color-surface-offset);
  border: 1.5px solid var(--color-border);
  border-radius: var(--radius-xl);
  font-weight: 600; font-size: var(--text-sm);
}
.confirm-delete-ok {
  flex: 1; padding: 12px;
  background: #dc2626; color: white;
  border-radius: var(--radius-xl);
  font-weight: 700; font-size: var(--text-sm);
}
[data-theme="dark"] .confirm-delete-ok { background: #b91c1c; }

/* Scrollbar styling */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 99px; }
</style>
</head>
<body>
<div class="app-shell">
  
  <!-- Pages -->
  <div class="pages">

    <!-- ── SPEND NOW PAGE ── -->
    <div class="page active" id="page-spend">
      <div class="page-header">
        <!-- SVG Logo -->
        <div style="display:flex;align-items:center;gap:8px;">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none" aria-label="PennyPatrol logo">
            <rect width="28" height="28" rx="8" fill="var(--color-primary)"/>
            <path d="M14 7C10.134 7 7 10.134 7 14s3.134 7 7 7 7-3.134 7-7-3.134-7-7-7z" stroke="white" stroke-width="1.5" fill="none"/>
            <path d="M14 10v1.5M14 16.5V18M11.5 12.5c0-.828.672-1.5 1.5-1.5h1.5a1.5 1.5 0 010 3H13a1.5 1.5 0 000 3H14.5a1.5 1.5 0 001.5-1.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span style="font-size:var(--text-base);font-weight:700;letter-spacing:-0.02em;">PennyPatrol</span>
        </div>
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>

      <!-- Top Half: Amount + Date -->
      <div class="spend-top" id="spend-top">
        <button class="date-field" id="date-display" onclick="event.stopPropagation(); openDateModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
          </svg>
          <span id="date-text">Today, Apr 27</span>
        </button>
        <div class="amount-display-wrap" onclick="document.getElementById('amount-input').focus()">
          <span class="amount-currency">$</span>
          <input type="number" id="amount-input" inputmode="decimal" min="0" step="0.01"
            placeholder="0.00" aria-label="Enter amount"
            oninput="handleAmountInput(this)" onfocus="this.select()">
        </div>
        <div class="note-field" onclick="event.stopPropagation()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          <input type="text" id="note-input" placeholder="Add a note (optional)" maxlength="60" onclick="event.stopPropagation()">
        </div>
      </div>

      <!-- Bottom Half: Categories -->
      <div class="spend-bottom">
        <div class="section-label-row">
          <span class="section-label" style="margin-bottom:0;">Category</span>
          <button class="add-cat-btn" onclick="openNewCatModal()" aria-label="Add custom category">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
            New
          </button>
        </div>
        <div class="categories-grid" id="categories-grid">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Confirm -->
      <div class="confirm-bar">
        <button class="confirm-btn" id="confirm-btn" disabled onclick="confirmExpense()">CONFIRM</button>
      </div>
    </div>

    <!-- ── ACTIVITY PAGE ── -->
    <div class="page" id="page-activity">
      <div class="page-header">
        <h1>Activity</h1>
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <div class="filter-row" id="filter-row">
        <button class="filter-chip active" data-filter="all" onclick="setFilter('all', this)">All Time</button>
        <button class="filter-chip" data-filter="today" onclick="setFilter('today', this)">Today</button>
        <button class="filter-chip" data-filter="week" onclick="setFilter('week', this)">This Week</button>
        <button class="filter-chip" data-filter="month" onclick="setFilter('month', this)">Month</button>
        <button class="filter-chip" data-filter="year" onclick="setFilter('year', this)">Year</button>
      </div>
      <div class="activity-summary-bar" id="activity-summary" style="display:none">
        <span id="activity-count-label">0 transactions</span>
        <strong id="activity-total-label">$0.00</strong>
      </div>
      <div class="activity-list" id="activity-list">
        <div class="empty-state" id="activity-empty">
          <div class="empty-icon">🧾</div>
          <h3>No expenses yet</h3>
          <p>Tap Spend Now to record your first transaction.</p>
        </div>
      </div>
    </div>

    <!-- ── STATISTICS PAGE ── -->
    <div class="page" id="page-stats">
      <div class="page-header">
        <h1>Statistics</h1>
        <button class="theme-toggle" data-theme-toggle aria-label="Toggle theme">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
      <div class="stats-content" id="stats-content">
        <!-- Populated by JS -->
      </div>
    </div>

  </div><!-- /pages -->

  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <button class="nav-item" onclick="navigate('activity')" id="nav-activity">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12h18M3 6h18M3 18h18"/>
      </svg>
      <span>Activity</span>
    </button>
    <button class="nav-center" onclick="navigate('spend')" id="nav-spend">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      <span>SPEND</span>
    </button>
    <button class="nav-item" onclick="navigate('stats')" id="nav-stats">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 20V10M12 20V4M6 20v-6"/>
      </svg>
      <span>Statistics</span>
    </button>
  </nav>

</div><!-- /app-shell -->

<!-- Toast -->
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<!-- Date Modal -->
<div class="modal-overlay" id="date-modal" onclick="closeDateModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-title">Select Date</div>
    <div class="date-input-row">
      <label for="date-picker">Date</label>
      <input type="date" id="date-picker" class="date-native-input">
    </div>
    <button class="modal-action-btn" onclick="applyDate()">Done</button>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────
const state = {
  expenses: [],
  selectedCategory: null,
  amountRaw: '',
  selectedDate: new Date(),
  currentPage: 'spend',
  activeFilter: 'all',
  statsTab: 'month'
};

// ─── Categories ───────────────────────────────────
const CATEGORIES = [
  { id: 'food',        label: 'Food',        emoji: '🍔', color: '#f97316' },
  { id: 'transport',   label: 'Transport',   emoji: '🚗', color: '#3b82f6' },
  { id: 'groceries',   label: 'Groceries',   emoji: '🛒', color: '#22c55e' },
  { id: 'shopping',    label: 'Shopping',    emoji: '🛍️', color: '#a855f7' },
  { id: 'health',      label: 'Health',      emoji: '💊', color: '#ef4444' },
  { id: 'coffee',      label: 'Coffee',      emoji: '☕', color: '#92400e' },
  { id: 'bills',       label: 'Bills',       emoji: '📄', color: '#6b7280' },
  { id: 'dining',      label: 'Dining',      emoji: '🍽️', color: '#f59e0b' },
  { id: 'fitness',     label: 'Fitness',     emoji: '🏋️', color: '#10b981' },
  { id: 'travel',      label: 'Travel',      emoji: '✈️', color: '#0ea5e9' },
  { id: 'entertainment', label: 'Fun',       emoji: '🎬', color: '#ec4899' },
  { id: 'other',       label: 'Other',       emoji: '💳', color: '#8b5cf6' },
];

// ─── Clock ────────────────────────────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }).replace(' AM','').replace(' PM','');
}
updateClock();
setInterval(updateClock, 10000);

// ─── Dark Mode ────────────────────────────────────
const html = document.documentElement;
let theme = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
html.setAttribute('data-theme', theme);

document.querySelectorAll('[data-theme-toggle]').forEach(btn => {
  btn.addEventListener('click', () => {
    theme = theme === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', theme);
    btn.innerHTML = theme === 'dark'
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  });
});

// ─── Navigation ───────────────────────────────────
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');

  document.querySelectorAll('.nav-item, .nav-center').forEach(n => n.classList.remove('active'));
  document.getElementById('nav-' + page).classList.add('active');

  state.currentPage = page;
  if (page === 'activity') renderActivity();
  if (page === 'stats') renderStats();
}

// Set default active nav
document.getElementById('nav-spend').classList.add('active');

// ─── Category Grid ────────────────────────────────
function renderCategories() {
  const grid = document.getElementById('categories-grid');
  grid.innerHTML = CATEGORIES.map(cat => `
    <button class="cat-btn${state.selectedCategory === cat.id ? ' selected' : ''}"
            onclick="selectCategory('${cat.id}')"
            aria-label="${cat.label}" role="button">
      <div class="cat-icon" style="background:${cat.color}22;">${cat.emoji}</div>
      <span class="cat-name">${cat.label}</span>
    </button>
  `).join('');
}
renderCategories();

function selectCategory(id) {
  state.selectedCategory = state.selectedCategory === id ? null : id;
  renderCategories();
  updateConfirmBtn();
}

// ─── Amount Input ─────────────────────────────────
function handleAmountInput(el) {
  let val = el.value;
  // Clamp to 2 decimal places
  if (val.includes('.')) {
    const parts = val.split('.');
    if (parts[1] && parts[1].length > 2) {
      val = parts[0] + '.' + parts[1].slice(0, 2);
      el.value = val;
    }
  }
  state.amountRaw = val;
  updateConfirmBtn();
}

function updateConfirmBtn() {
  const btn = document.getElementById('confirm-btn');
  const amount = parseFloat(document.getElementById('amount-input').value);
  const valid = amount > 0 && state.selectedCategory;
  btn.disabled = !valid;
}

// ─── Date ─────────────────────────────────────────
function formatDisplayDate(d) {
  const today = new Date();
  const yesterday = new Date(); yesterday.setDate(today.getDate() - 1);
  if (isSameDay(d, today)) return 'Today, ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  if (isSameDay(d, yesterday)) return 'Yesterday, ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function isSameDay(a, b) {
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function updateDateDisplay() {
  document.getElementById('date-text').textContent = formatDisplayDate(state.selectedDate);
}
updateDateDisplay();

function openDateModal() {
  const modal = document.getElementById('date-modal');
  const picker = document.getElementById('date-picker');
  const d = state.selectedDate;

}
function closeDateModal(e) {
  document.getElementById('date-modal').classList.remove('open');
}
function applyDate() {
  const val = document.getElementById('date-picker').value;
  if (val) {
    const [y, m, d] = val.split('-').map(Number);
    state.selectedDate = new Date(y, m - 1, d, 12, 0, 0);

  }
  closeDateModal();
}

// ─── Confirm Expense ──────────────────────────────
function confirmExpense() {
  const amountEl = document.getElementById('amount-input');
  const amount = parseFloat(amountEl.value);
  if (!amount || !state.selectedCategory) return;

  const cat = CATEGORIES.find(c => c.id === state.selectedCategory);
  const note = document.getElementById('note-input').value.trim();

  state.expenses.unshift({
    id: Date.now(),
    amount,
    category: state.selectedCategory,
    categoryLabel: cat.label,
    categoryEmoji: cat.emoji,
    categoryColor: cat.color,
    note: note || '',
    date: new Date(state.selectedDate),
    createdAt: new Date()
  });

  // Reset
  state.amountRaw = '';
  state.selectedCategory = null;
  amountEl.value = '';
  document.getElementById('note-input').value = '';
  updateConfirmBtn();
  renderCategories();
  showToast('✅ Expense added!');
}

// ─── Toast ────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ─── Activity Filtering ───────────────────────────
function setFilter(filter, el) {
  state.activeFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderActivity();
}

function getFilteredExpenses() {
  const now = new Date();
  return state.expenses.filter(e => {
    const d = new Date(e.date);
    switch (state.activeFilter) {
      case 'today': return isSameDay(d, now);
      case 'week': {
        const start = new Date(now); start.setDate(now.getDate() - now.getDay()); start.setHours(0,0,0,0);
        return d >= start;
      }
      case 'month': return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      case 'year': return d.getFullYear() === now.getFullYear();
      default: return true;
    }
  });
}

function renderActivity() {
  const list = document.getElementById('activity-list');
  const emptyEl = document.getElementById('activity-empty');
  const summaryBar = document.getElementById('activity-summary');
  const filtered = getFilteredExpenses();

  if (filtered.length === 0) {
    list.innerHTML = '';
    list.appendChild(emptyEl);
    emptyEl.style.display = '';
    summaryBar.style.display = 'none';
    return;
  }

  emptyEl.style.display = 'none';
  const total = filtered.reduce((sum, e) => sum + e.amount, 0);
  document.getElementById('activity-count-label').textContent = `${filtered.length} transaction${filtered.length !== 1 ? 's' : ''}`;
  document.getElementById('activity-total-label').textContent = '$' + total.toFixed(2);
  summaryBar.style.display = 'flex';

  // Group by date
  const groups = {};
  filtered.forEach(e => {
    const key = new Date(e.date).toDateString();
    if (!groups[key]) groups[key] = { date: new Date(e.date), items: [] };
    groups[key].items.push(e);
  });

  const today = new Date();
  list.innerHTML = Object.values(groups).sort((a, b) => b.date - a.date).map(group => {
    const labelStr = isSameDay(group.date, today) ? 'Today'
      : isSameDay(group.date, new Date(today.getTime() - 86400000)) ? 'Yesterday'
      : group.date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });

    return `
      <div class="activity-date-group">
        <div class="activity-date-label">${labelStr}</div>
        ${group.items.map(e => `
          <div class="activity-item" onclick="openEditSheet(${e.id})">
            <div class="activity-icon" style="background:${e.categoryColor}22;">${e.categoryEmoji}</div>
            <div class="activity-info">
              <div class="activity-cat">${e.categoryLabel}</div>
              ${e.note ? `<div class="activity-note">${e.note}</div>` : ''}
              <div class="activity-time">${new Date(e.createdAt).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
            </div>
            <div style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
              <div class="activity-amount">$${e.amount.toFixed(2)}</div>
              <div class="activity-item-menu" onclick="event.stopPropagation();openEditSheet(${e.id})">
                <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg>
              </div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  }).join('');
}

// ─── Statistics ───────────────────────────────────
function getStatExpenses(tab) {
  const now = new Date();
  return state.expenses.filter(e => {
    const d = new Date(e.date);
    switch (tab) {
      case 'week': {
        const start = new Date(now); start.setDate(now.getDate() - now.getDay()); start.setHours(0,0,0,0);
        return d >= start;
      }
      case 'month': return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
      case 'year': return d.getFullYear() === now.getFullYear();
      default: return true; // all
    }
  });
}

function renderStats() {
  const content = document.getElementById('stats-content');
  const tab = state.statsTab;
  const expenses = getStatExpenses(tab);

  const tabLabels = { week: 'This Week', month: 'This Month', year: 'This Year', all: 'All Time' };
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const count = expenses.length;
  const avg = count > 0 ? total / count : 0;

  // Category breakdown
  const byCategory = {};
  expenses.forEach(e => {
    if (!byCategory[e.category]) byCategory[e.category] = { label: e.categoryLabel, emoji: e.categoryEmoji, color: e.categoryColor, total: 0 };
    byCategory[e.category].total += e.amount;
  });
  const catArr = Object.values(byCategory).sort((a, b) => b.total - a.total);
  const maxCat = catArr[0] ? catArr[0].total : 1;

  // Period breakdown (for 'month' show weekly, for 'year' show monthly, for 'week' show daily)
  let periodRows = [];
  if (tab === 'month') {
    // Weekly within the month
    const weeks = ['Week 1','Week 2','Week 3','Week 4'];
    weeks.forEach((label, i) => {
      const sum = expenses.filter(e => {
        const d = new Date(e.date).getDate();
        return d >= i*7+1 && d <= (i+1)*7;
      }).reduce((s, e) => s + e.amount, 0);
      if (sum > 0) periodRows.push({ label, amount: sum });
    });
  } else if (tab === 'year') {
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    months.forEach((label, i) => {
      const sum = expenses.filter(e => new Date(e.date).getMonth() === i).reduce((s, e) => s + e.amount, 0);
      if (sum > 0) periodRows.push({ label, amount: sum });
    });
  } else if (tab === 'week') {
    const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    days.forEach((label, i) => {
      const sum = expenses.filter(e => new Date(e.date).getDay() === i).reduce((s, e) => s + e.amount, 0);
      if (sum > 0) periodRows.push({ label, amount: sum });
    });
  } else {
    // All time: group by month
    const byMonth = {};
    expenses.forEach(e => {
      const d = new Date(e.date);
      const key = `${d.getFullYear()}-${d.getMonth()}`;
      if (!byMonth[key]) byMonth[key] = { label: d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' }), amount: 0 };
      byMonth[key].amount += e.amount;
    });
    periodRows = Object.values(byMonth).reverse().slice(0, 6);
  }
  const maxPeriod = periodRows.reduce((m, r) => Math.max(m, r.amount), 0) || 1;

  content.innerHTML = `
    <!-- Period Tabs -->
    <div class="stats-period-tabs">
      ${['week','month','year','all'].map(t => `
        <button class="stats-tab${tab === t ? ' active' : ''}" onclick="setStatsTab('${t}')">${
          t === 'week' ? 'Week' : t === 'month' ? 'Month' : t === 'year' ? 'Year' : 'All'
        }</button>
      `).join('')}
    </div>

    <!-- Total Card -->
    <div class="stats-total-card">
      <div class="stats-total-label">${tabLabels[tab]}</div>
      <div class="stats-total-amount">$${total.toFixed(2)}</div>
      <div class="stats-total-sub">${count} transaction${count !== 1 ? 's' : ''}</div>
    </div>

    <!-- KPIs -->
    <div class="stats-timeline-grid">
      <div class="stats-kpi">
        <div class="stats-kpi-label">Avg / txn</div>
        <div class="stats-kpi-value">$${avg.toFixed(2)}</div>
        <div class="stats-kpi-sub">per transaction</div>
      </div>
      <div class="stats-kpi">
        <div class="stats-kpi-label">Top Category</div>
        <div class="stats-kpi-value">${catArr[0] ? catArr[0].emoji + ' ' + catArr[0].label : '—'}</div>
        <div class="stats-kpi-sub">${catArr[0] ? '$' + catArr[0].total.toFixed(2) : 'No data'}</div>
      </div>
    </div>

    ${catArr.length > 0 ? `
    <!-- By Category -->
    <div class="stats-section-title">By Category</div>
    <div class="stats-bar-card">
      ${catArr.map(c => `
        <div class="stats-bar-row">
          <span class="stats-bar-icon">${c.emoji}</span>
          <span class="stats-bar-label">${c.label}</span>
          <div class="stats-bar-track">
            <div class="stats-bar-fill" style="width:${(c.total/maxCat*100).toFixed(1)}%;background:${c.color};"></div>
          </div>
          <span class="stats-bar-amount">$${c.total.toFixed(2)}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${periodRows.length > 0 ? `
    <!-- By Period -->
    <div class="stats-section-title">${tab === 'month' ? 'By Week' : tab === 'year' ? 'By Month' : tab === 'week' ? 'By Day' : 'Recent Months'}</div>
    <div class="stats-bar-card">
      ${periodRows.map(r => `
        <div class="stats-bar-row">
          <span class="stats-bar-icon" style="font-size:12px;font-weight:600;color:var(--color-text-muted);">${r.label.substring(0,3)}</span>
          <span class="stats-bar-label">${r.label}</span>
          <div class="stats-bar-track">
            <div class="stats-bar-fill" style="width:${(r.amount/maxPeriod*100).toFixed(1)}%;background:var(--color-primary);"></div>
          </div>
          <span class="stats-bar-amount">$${r.amount.toFixed(2)}</span>
        </div>
      `).join('')}
    </div>` : ''}

    ${count === 0 ? `
    <div class="empty-state">
      <div class="empty-icon">📊</div>
      <h3>No data yet</h3>
      <p>Add some expenses to see your statistics here.</p>
    </div>` : ''}
  `;
}

function setStatsTab(tab) {
  state.statsTab = tab;
  renderStats();
}

let newCatState = { emoji: '🏷️', color: '#f97316', name: '' };

function openNewCatModal() {
  newCatState = { emoji: '🏷️', color: '#f97316', name: '' };
  document.getElementById('new-cat-name').value = '';
  renderEmojiGrid();
  renderColorSwatches();
  updateCatPreview();

function closeNewCatModal(e) {
  if (!e || e.target === document.getElementById('new-cat-modal')) {
    document.getElementById('new-cat-modal').classList.remove('open');
  }
}

function renderEmojiGrid() {
  document.getElementById('emoji-grid').innerHTML = EMOJI_OPTIONS.map(em => `
    <button class="emoji-opt${newCatState.emoji === em ? ' selected' : ''}"
            onclick="selectEmoji('${em}')" aria-label="${em}">${em}</button>
  `).join('');
}

function renderColorSwatches() {
  document.getElementById('color-swatches').innerHTML = COLOR_OPTIONS.map(c => `
    <button class="color-swatch${newCatState.color === c ? ' selected' : ''}"
            style="background:${c};"
            onclick="selectColor('${c}')" aria-label="Color ${c}"></button>

  newCatState.emoji = em;

  updateCatPreview();

  newCatState.color = c;
  renderColorSwatches();
  updateCatPreview();
}

function updateCatPreview() {
  const name = document.getElementById('new-cat-name').value.trim();
  newCatState.name = name;
  document.getElementById('preview-icon').textContent = newCatState.emoji;
  document.getElementById('preview-icon').style.background = newCatState.color + '22';
  document.getElementById('preview-name').textContent = name || 'My Category';
  document.getElementById('save-cat-btn').disabled = name.length < 1;
}

function saveNewCategory() {
  const name = newCatState.name.trim();
  if (!name) return;
  const id = 'custom_' + Date.now();
  CATEGORIES.push({ id, label: name, emoji: newCatState.emoji, color: newCatState.color });
  renderCategories();
  closeNewCatModal();
  showToast('✅ Category "' + name + '" added!');
}


// ─── Edit / Delete Sheet ──────────────────────────
let editingId = null;
let editCatSelected = null;

function openEditSheet(id) {
  const expense = state.expenses.find(e => e.id === id);
  if (!expense) return;
  editingId = id;
  editCatSelected = expense.category;

  // Populate fields
  document.getElementById('edit-amount').value = expense.amount.toFixed(2);
  document.getElementById('edit-note').value = expense.note || '';

  // Date
  const d = new Date(expense.date);
  const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  document.getElementById('edit-date').value = dateStr;

  // Category grid
  renderEditCatGrid();

  // Action sheet detail
  document.getElementById('edit-sheet-emoji').textContent = expense.categoryEmoji;
  document.getElementById('edit-sheet-emoji').style.background = expense.categoryColor + '22';
  document.getElementById('edit-sheet-cat').textContent = expense.categoryLabel;
  document.getElementById('edit-sheet-amount').textContent = '$' + expense.amount.toFixed(2);

  document.getElementById('edit-action-sheet').classList.add('open');
}

function closeEditSheet() {
  document.getElementById('edit-action-sheet').classList.remove('open');
}

function renderEditCatGrid() {
  document.getElementById('edit-cat-grid').innerHTML = CATEGORIES.map(cat => `
    <button class="edit-cat-opt${editCatSelected === cat.id ? ' selected' : ''}"
            onclick="editSelectCat('${cat.id}')">
      ${cat.emoji}
      <span>${cat.label}</span>
    </button>
  `).join('');
}

function editSelectCat(id) {
  editCatSelected = id;
  renderEditCatGrid();
}

function saveEdit() {
  const idx = state.expenses.findIndex(e => e.id === editingId);
  if (idx === -1) return;

  const amount = parseFloat(document.getElementById('edit-amount').value);
  if (!amount || amount <= 0) { showToast('⚠️ Enter a valid amount'); return; }

  const cat = CATEGORIES.find(c => c.id === editCatSelected);
  const note = document.getElementById('edit-note').value.trim();
  const dateVal = document.getElementById('edit-date').value;
  let date = state.expenses[idx].date;
  if (dateVal) {
    const [y, m, d] = dateVal.split('-').map(Number);
    date = new Date(y, m - 1, d, 12, 0, 0);
  }

  state.expenses[idx] = {
    ...state.expenses[idx],
    amount,
    category: cat.id,
    categoryLabel: cat.label,
    categoryEmoji: cat.emoji,
    categoryColor: cat.color,
    note,
    date
  };

  // Re-sort by date desc
  state.expenses.sort((a, b) => new Date(b.date) - new Date(a.date));

  closeEditSheet();
  renderActivity();
  if (state.currentPage === 'stats') renderStats();
  showToast('✏️ Expense updated!');
}

function confirmDelete() {
  document.getElementById('confirm-delete-dialog').classList.add('open');
}

function cancelDelete() {
  document.getElementById('confirm-delete-dialog').classList.remove('open');
}

function executeDelete() {
  state.expenses = state.expenses.filter(e => e.id !== editingId);
  cancelDelete();
  closeEditSheet();
  renderActivity();
  if (state.currentPage === 'stats') renderStats();
  showToast('🗑️ Expense deleted');
}

// ─── Init ─────────────────────────────────────────
renderActivity();
renderStats();
</script>

        <div class="action-sheet-label delete">Delete Expense</div>
        <div class="action-sheet-sub">This action cannot be undone</div>
      </div>
    </button>
  </div>
</div>

<!-- Confirm Delete Dialog -->
<div class="confirm-delete-overlay" id="confirm-delete-dialog" onclick="if(event.target===this)cancelDelete()">
  <div class="confirm-delete-box">
    <div class="confirm-delete-emoji">🗑️</div>
    <div class="confirm-delete-title">Delete this expense?</div>
    <div class="confirm-delete-sub">This will permanently remove the transaction from your history.</div>
    <div class="confirm-delete-btns">
      <button class="confirm-delete-cancel" onclick="cancelDelete()">Keep it</button>
      <button class="confirm-delete-ok" onclick="executeDelete()">Delete</button>
    </div>
  </div>
</div>

</body>
</html>
